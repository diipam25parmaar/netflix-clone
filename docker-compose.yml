version: "3.9"
services:

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:8
    command: ["redis-server", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    env_file:
      - ./packages/backend/.env.dev
    depends_on:
      - mongo
      - redis
      - minio
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    env_file:
      - ./packages/frontend/.env.dev
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:1.29
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend

volumes:
  mongo_data:
  redis_data:
  minio_data:
